server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true

spring:
  datasource:
    url: jdbc:h2:mem:txdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# Micrometer (Prometheus registry doesn't need extra config here)
management.metrics:
  export:
    prometheus:
      enabled: true

