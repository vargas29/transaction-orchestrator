c<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <rect x="30" y="20" width="360" height="240" rx="4" fill="#fff" stroke="#000" />
  <text x="210" y="40" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">customers</text>
  <text x="60" y="70" font-family="Arial" font-size="12">id : UUID (PK)</text>
  <text x="60" y="90" font-family="Arial" font-size="12">document_type</text>
  <text x="60" y="110" font-family="Arial" font-size="12">document_number</text>
  <text x="60" y="130" font-family="Arial" font-size="12">country_calling_code</text>
  <text x="60" y="150" font-family="Arial" font-size="12">phone_number</text>
  <text x="60" y="170" font-family="Arial" font-size="12">email</text>
  <text x="60" y="190" font-family="Arial" font-size="12">first_name</text>
  <text x="60" y="210" font-family="Arial" font-size="12">second_name</text>
  <text x="60" y="230" font-family="Arial" font-size="12">first_surname</text>

  <rect x="420" y="20" width="500" height="320" rx="4" fill="#fff" stroke="#000" />
  <text x="670" y="40" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">transactions</text>
  <text x="440" y="70" font-family="Arial" font-size="12">id : UUID (PK)</text>
  <text x="440" y="90" font-family="Arial" font-size="12">transaction_id : VARCHAR (unique)</text>
  <text x="440" y="110" font-family="Arial" font-size="12">amount_in_cents : BIGINT</text>
  <text x="440" y="130" font-family="Arial" font-size="12">currency_code</text>
  <text x="440" y="150" font-family="Arial" font-size="12">country_code</text>
  <text x="440" y="170" font-family="Arial" font-size="12">payment_method_id</text>
  <text x="440" y="190" font-family="Arial" font-size="12">transaction_description</text>
  <text x="440" y="210" font-family="Arial" font-size="12">link_expiration_time</text>
  <text x="440" y="230" font-family="Arial" font-size="12">processing_date</text>
  <text x="440" y="250" font-family="Arial" font-size="12">created_at</text>
  <text x="440" y="270" font-family="Arial" font-size="12">updated_at</text>
  <text x="440" y="290" font-family="Arial" font-size="12">webhook_url</text>
  <text x="440" y="310" font-family="Arial" font-size="12">redirect_url</text>
  <text x="440" y="330" font-family="Arial" font-size="12">status</text>
  <text x="440" y="350" font-family="Arial" font-size="12">customer_id : UUID (FK -> customers.id)</text>

  <!-- Arrow -->
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#000" />
    </marker>
  </defs>
  <line x1="390" y1="160" x2="420" y2="160" stroke="#000" stroke-width="2" marker-end="url(#arrow2)" />

  <text x="480" y="390" font-family="Arial" font-size="12">Normalización aplicada: 1NF, 2NF y 3NF — separación de clientes y transacciones para evitar redundancia y asegurar integridad referencial.</text>
</svg>
